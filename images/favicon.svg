<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="7" fill="#080b1a"/>

  <!-- Tiny stars -->
  <circle cx="4"  cy="5"  r="0.9"  fill="#c8d4e8" opacity="0.75"/>
  <circle cx="27" cy="4"  r="0.65" fill="#e8c87a"  opacity="0.9"/>
  <circle cx="29" cy="23" r="0.75" fill="#c8d4e8" opacity="0.6"/>
  <circle cx="3"  cy="26" r="0.6"  fill="#c8d4e8" opacity="0.55"/>
  <circle cx="25" cy="27" r="0.7"  fill="#c8d4e8" opacity="0.5"/>

  <!-- Asteroid body — irregular rocky polygon, slightly tilted -->
  <path d="M20 7 L24 10 L26 14 L25 18 L22 22 L18 24 L13 23 L9 19 L8 15 L10 10 L14 7 Z"
        fill="#888890"/>

  <!-- Craters -->
  <ellipse cx="16" cy="14" rx="3.5" ry="3"   fill="#63636e"/>
  <ellipse cx="20" cy="19" rx="2"   ry="1.8" fill="#676772"/>
  <circle  cx="11" cy="17" r="1.3"            fill="#6b6b76"/>

  <!-- Sunlit edge highlight (top-left) -->
  <path d="M14 7 L20 7 L24 10 L25 13"
        stroke="#b8b8ca" stroke-width="1.2" fill="none"
        stroke-linecap="round" opacity="0.55"/>
</svg>
